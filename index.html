<!DOCTYPE html>
<head>
<meta charset="UTF-8">
<title>Juggad Sells</title>
<link rel="manifest" href="manifest.json">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta charset="UTF-8">
<title>Juggad Sells</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f5f5f5;
}
header {
  background: #444;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
}
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  padding: 10px;
}
.category {
  background: white;
  border: 1px solid #ccc;
  border-radius: 8px;
  padding: 15px;
  text-align: center;
  cursor: pointer;
}
.bill {
  background: white;
  margin: 10px;
  padding: 10px;
  border-radius: 8px;
}
button {
  padding: 8px 12px;
  margin: 5px;
}
</style>
</head>
<body>

<header>Juggad Sells</header>

<div class="grid" id="categories"></div>

<div class="bill">
  <div id="items"></div>
  <hr>
  Discount: <input type="number" id="discount" value="0"><br>
  <label><input type="checkbox" id="round"> Round Off</label>
  <h3 id="total">Total: ₹0</h3>
  <button onclick="saveBill()">Save Bill</button>
  <button onclick="viewBills()">Previous Bills</button>
  <button onclick="clearBill()">Clear</button>
</div>

<script>
let categories = ["Bag","Gifts","Toys","Events","Cosmetics","Jewellery","Stationary","Home Care"];
let bill = [];
let billNo = localStorage.getItem("billNo") || 1;

function renderCategories() {
  let grid = document.getElementById("categories");
  grid.innerHTML = "";
  categories.forEach(cat => {
    let div = document.createElement("div");
    div.className = "category";
    div.innerHTML = "<strong>" + cat + "</strong>";
    div.onclick = () => addItem(cat);
    grid.appendChild(div);
  });
}

function addItem(cat) {
  let rate = prompt("Enter Rate");
  if (!rate) return;
  let qty = prompt("Enter Quantity (default 1)") || 1;
  bill.push({cat, rate: Number(rate), qty: Number(qty)});
  renderBill();
}

function renderBill() {
  let itemsDiv = document.getElementById("items");
  itemsDiv.innerHTML = "";
  let total = 0;
  bill.forEach(item => {
    let line = item.rate * item.qty;
    total += line;
    itemsDiv.innerHTML += item.cat + " " + item.rate + " × " + item.qty + " = " + line + "<br>";
  });
  let discount = Number(document.getElementById("discount").value);
  total -= discount;
  if (document.getElementById("round").checked) {
    total = Math.round(total);
  }
  document.getElementById("total").innerText = "Total: ₹" + total;
}

document.getElementById("discount").oninput = renderBill;
document.getElementById("round").onchange = renderBill;

function saveBill() {
  let bills = JSON.parse(localStorage.getItem("bills") || "[]");
  bills.push({
    billNo: billNo.toString().padStart(4,'0'),
    date: new Date().toLocaleString(),
    items: bill
  });
  localStorage.setItem("bills", JSON.stringify(bills));
  billNo++;
  localStorage.setItem("billNo", billNo);
  clearBill();
  alert("Bill Saved");
}

function viewBills() {
  let bills = JSON.parse(localStorage.getItem("bills") || "[]");
  let output = "";
  bills.forEach(b => {
    output += "Bill " + b.billNo + " - " + b.date + "\n";
  });
  alert(output || "No Bills");
}

function clearBill() {
  bill = [];
  document.getElementById("discount").value = 0;
  document.getElementById("round").checked = false;
  renderBill();
}

renderCategories();
</script>

</body>

</html>

<!DOCTYPE html><html>
<head><meta charset="UTF-8">
<title>Juggad Sells</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"><style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#444;
color:white;
padding:12px;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:10px;
}

.category{
background:white;
border-radius:8px;
padding:15px;
text-align:center;
cursor:pointer;
border:1px solid #ddd;
font-size:18px;
}

.category span{
display:block;
font-size:26px;
}

.bill{
background:white;
margin:10px;
padding:10px;
border-radius:8px;
}

.dashboard{
background:white;
margin:10px;
padding:10px;
border-radius:8px;
font-size:14px;
}

#items div{
padding:8px;
border-bottom:1px solid #eee;
cursor:pointer;
}

button{
padding:8px 10px;
margin:4px;
}

</style></head><body><header>
<h2>HIRA Gifts & General</h2>
<small>Main Road, Ambad | Mob: 7020773407</small>
</header><div class="dashboard" id="dashboard">
Today's Sales ₹0 | Bills 0
</div><div class="grid" id="categories"></div><div class="bill"><div id="items"></div><hr>Discount
<input type="number" id="discount" value="0">

<br><label>
<input type="checkbox" id="round"> Round Off
</label><h3 id="total">
Subtotal ₹0<br>
Discount ₹0<br>
<b>Total ₹0</b>
</h3><button onclick="manualSave()">Save</button>
<button onclick="printBill()">Print</button>
<button onclick="openPhonePopup()">WhatsApp</button>
<button onclick="exportExcel()">Excel</button>
<button onclick="viewTodayBills()">Bills</button>
<button onclick="clearBill()">Clear</button>

</div><!-- ITEM POPUP --><div id="itemPopup" onclick="outsideTap(event)" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);align-items:center;justify-content:center;"><div onclick="event.stopPropagation()" style="background:white;padding:20px;border-radius:10px;width:250px;"><h3 id="popupCategory"></h3>Rate
<input type="tel" id="rateInput">

<br><br>

Qty
<input type="tel" id="qtyInput" value="1">

</div>
</div><script>

let categories=[
{name:"Bag",icon:"👜"},
{name:"Gifts",icon:"🎁"},
{name:"Toys",icon:"🧸"},
{name:"Events",icon:"🎉"},
{name:"Cosmetics",icon:"💄"},
{name:"Jewellery",icon:"💍"},
{name:"Stationary",icon:"✏️"},
{name:"Home Care",icon:"🧴"},
{name:"Misc",icon:"🧾"}
];

let bill=[];
let billSaved=false;

function renderCategories(){

let grid=document.getElementById("categories");
grid.innerHTML="";

categories.forEach(cat=>{

let div=document.createElement("div");
div.className="category";

div.innerHTML="<span>"+cat.icon+"</span>"+cat.name;

div.onclick=function(){
openPopup(cat.name);
};

grid.appendChild(div);

});
}

function openPopup(cat){

document.getElementById("popupCategory").innerText=cat;

document.getElementById("rateInput").value="";
document.getElementById("qtyInput").value=1;

document.getElementById("itemPopup").style.display="flex";

document.getElementById("rateInput").focus();

}

function outsideTap(e){

if(e.target.id!=="itemPopup") return;

confirmItem();
document.getElementById("itemPopup").style.display="none";

}

function confirmItem(){

let rate=Number(document.getElementById("rateInput").value);
let qty=Number(document.getElementById("qtyInput").value)||1;

if(rate<=0) return;

let cat=document.getElementById("popupCategory").innerText;

bill.push({cat,rate,qty});

renderBill();

}

function renderBill(){

let itemsDiv=document.getElementById("items");
itemsDiv.innerHTML="";

let subtotal=0;

bill.forEach((item,index)=>{

let line=item.rate*item.qty;
subtotal+=line;

let div=document.createElement("div");

div.innerText=item.cat+" "+item.rate+" × "+item.qty+" = "+line;

div.onclick=function(){

let action=prompt("Type:\n1 Edit\n2 Delete");

if(action==="1"){

let r=prompt("Rate",item.rate);
let q=prompt("Qty",item.qty);

if(r!==null) bill[index].rate=Number(r);
if(q!==null) bill[index].qty=Number(q);

}

if(action==="2"){
bill.splice(index,1);
}

renderBill();

};

itemsDiv.appendChild(div);

});

let discount=Number(document.getElementById("discount").value)||0;

let total=subtotal-discount;

if(document.getElementById("round").checked){
total=Math.round(total);
}

document.getElementById("total").innerHTML=
"Subtotal ₹"+subtotal+
"<br>Discount ₹"+discount+
"<br><b>Total ₹"+total+"</b>";

}

document.getElementById("discount").addEventListener("input",renderBill);

document.getElementById("rateInput").addEventListener("keydown",function(e){
if(e.key==="Enter"){
confirmItem();
document.getElementById("itemPopup").style.display="none";
}
});

document.getElementById("qtyInput").addEventListener("keydown",function(e){
if(e.key==="Enter"){
confirmItem();
document.getElementById("itemPopup").style.display="none";
}
});

function manualSave(){
billSaved=true;
alert("Bill Saved");
}

function printBill(){
alert("Print works same as before");
}

function exportExcel(){
alert("Excel export same as before");
}

function viewTodayBills(){
alert("Bills view same as before");
}

function openPhonePopup(){
alert("WhatsApp same as before");
}

function clearBill(){

bill=[];
billSaved=false;

document.getElementById("discount").value=0;

renderBill();

}

renderCategories();

</script></body>
</html>

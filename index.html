<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Juggad Sells</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;margin:0;background:#f2f2f2;}
header{background:#444;color:white;padding:12px;text-align:center;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:10px;}
.category{background:white;border-radius:8px;padding:15px;text-align:center;cursor:pointer;border:1px solid #ddd;font-size:18px;}
.category span{display:block;font-size:26px;}
.bill{background:white;margin:10px;padding:10px;border-radius:8px;}
.dashboard{background:white;margin:10px;padding:10px;border-radius:8px;}
#items div{padding:8px;border-bottom:1px solid #eee;}
button{padding:8px;margin:4px;}
</style>
</head>

<body>

<header>
<h2>HIRA Gifts & General</h2>
<small>Main Road, Ambad | Mob: 7020773407</small>
</header>

<div class="dashboard" id="dashboard">
Today's Sales ₹0 | Bills 0
</div>

<div class="grid" id="categories"></div>

<div class="bill">
<div id="items"></div>
<hr>

Discount <input type="number" id="discount" value="0"><br>
<label><input type="checkbox" id="round"> Round Off</label>

<h3 id="total">Subtotal ₹0<br>Discount ₹0<br><b>Total ₹0</b></h3>

<button onclick="saveBill()">Save</button>
<button onclick="printBill()">Print</button>
<button onclick="sendWhatsApp()">WhatsApp</button>
<button onclick="exportExcel()">Excel</button>
<button onclick="viewToday()">Bills</button>
<button onclick="clearBill()">Clear</button>
</div>

<script>

let categories=["Bag","Gifts","Toys","Events","Cosmetics","Jewellery","Stationary","Home Care","Misc"];
let bill=[];
let billNo=localStorage.getItem("billNo")||1;

function renderCategories(){
let grid=document.getElementById("categories");
grid.innerHTML="";
categories.forEach(cat=>{
let div=document.createElement("div");
div.className="category";
div.innerText=cat;
div.onclick=()=>addItem(cat);
grid.appendChild(div);
});
}

function addItem(cat){
let rate=Number(prompt("Rate?"));
if(!rate) return;
let qty=Number(prompt("Qty?"))||1;

bill.push({cat,rate,qty});
renderBill();
}

function renderBill(){
let itemsDiv=document.getElementById("items");
itemsDiv.innerHTML="";

let subtotal=0;

bill.forEach((item,i)=>{
let line=item.rate*item.qty;
subtotal+=line;

let div=document.createElement("div");
div.innerText=item.cat+" "+item.rate+"×"+item.qty+" = "+line;

div.onclick=()=>{
let action=prompt("1 Edit\n2 Delete");
if(action==="1"){
item.rate=Number(prompt("Rate",item.rate));
item.qty=Number(prompt("Qty",item.qty));
}
if(action==="2") bill.splice(i,1);
renderBill();
};

itemsDiv.appendChild(div);
});

let discount=Number(document.getElementById("discount").value)||0;
let total=subtotal-discount;

if(document.getElementById("round").checked){
total=Math.round(total);
}

document.getElementById("total").innerHTML=
"Subtotal ₹"+subtotal+
"<br>Discount ₹"+discount+
"<br><b>Total ₹"+total+"</b>";
}

document.getElementById("discount").addEventListener("input",renderBill);

function saveBill(){
let bills=JSON.parse(localStorage.getItem("bills")||"[]");

bills.push({
billNo:billNo,
date:new Date(),
items:bill,
discount:Number(document.getElementById("discount").value)||0
});

localStorage.setItem("bills",JSON.stringify(bills));
billNo++;
localStorage.setItem("billNo",billNo);

updateDashboard();
alert("Saved");
}

function updateDashboard(){
let bills=JSON.parse(localStorage.getItem("bills")||"[]");
let today=new Date().toDateString();
let sales=0,count=0;

bills.forEach(b=>{
if(new Date(b.date).toDateString()===today){
count++;
b.items.forEach(i=>sales+=i.rate*i.qty);
sales-=b.discount||0;
}
});

document.getElementById("dashboard").innerText=
"Today's Sales ₹"+sales+" | Bills "+count;
}

function viewToday(){
let bills=JSON.parse(localStorage.getItem("bills")||"[]");
let today=new Date().toDateString();
let text="";

bills.forEach(b=>{
if(new Date(b.date).toDateString()===today){
let total=0;
b.items.forEach(i=>total+=i.rate*i.qty);
total-=b.discount||0;
text+="Bill "+b.billNo+" ₹"+total+"\n";
}
});

alert(text||"No bills");
}

function printBill(){
window.print();
}

function sendWhatsApp(){
let text="HIRA Gifts & General\n";
bill.forEach(i=>{
text+=i.cat+" "+i.rate+"×"+i.qty+"\n";
});
text+="\n"+document.getElementById("total").innerText;

window.open("https://wa.me/?text="+encodeURIComponent(text));
}

function exportExcel(){
let bills=JSON.parse(localStorage.getItem("bills")||"[]");
let csv="Bill,Category,Rate,Qty\n";

bills.forEach(b=>{
b.items.forEach(i=>{
csv+=b.billNo+","+i.cat+","+i.rate+","+i.qty+"\n";
});
});

let blob=new Blob([csv]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="sales.csv";
a.click();
}

function clearBill(){
bill=[];
document.getElementById("discount").value=0;
renderBill();
}

renderCategories();
updateDashboard();

</script>

</body>
</html>

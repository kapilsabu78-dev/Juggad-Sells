<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Juggad Sells</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#444;
color:white;
padding:14px;
text-align:center;
font-size:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:10px;
}

.category{
background:white;
border-radius:8px;
padding:15px;
text-align:center;
cursor:pointer;
border:1px solid #ddd;
font-size:18px;
}

.category span{
display:block;
font-size:24px;
}

.bill{
background:white;
margin:10px;
padding:10px;
border-radius:8px;
}

#items div{
padding:8px;
border-bottom:1px solid #eee;
cursor:pointer;
}

button{
padding:8px 12px;
margin:5px;
}

</style>

</head>

<body>

<header>Juggad Sells</header>

<div class="grid" id="categories"></div>

<div class="bill">

<div id="items"></div>

<hr>

Discount  
<input type="number" id="discount" value="0">

<br>

<label>
<input type="checkbox" id="round"> Round Off
</label>

<h3 id="total">Total: ₹0</h3>

<button onclick="saveBill()">Save Bill</button>
<button onclick="printBill()">Print</button>
<button onclick="shareWhatsApp()">WhatsApp</button>
<button onclick="exportExcel()">Export Excel</button>
<button onclick="viewBills()">Previous Bills</button>
<button onclick="clearBill()">Clear</button>

</div>

<!-- POPUP -->

<div id="itemPopup" onclick="outsideTap(event)" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);align-items:center;justify-content:center;">

<div onclick="event.stopPropagation()" style="background:white;padding:20px;border-radius:10px;width:260px;">

<h3 id="popupCategory"></h3>

Rate  
<input type="tel" id="rateInput">

<br><br>

Quantity  
<input type="tel" id="qtyInput" value="1">

<br><br>

<button onclick="confirmItem()">Add</button>

</div>
</div>

<script>

let categories=[
{name:"Bag",icon:"👜"},
{name:"Gifts",icon:"🎁"},
{name:"Toys",icon:"🧸"},
{name:"Events",icon:"🎉"},
{name:"Cosmetics",icon:"💄"},
{name:"Jewellery",icon:"💍"},
{name:"Stationary",icon:"✏️"},
{name:"Home Care",icon:"🧴"}
];

let bill=[];
let billNo=localStorage.getItem("billNo")||1;


function shareWhatsApp(){

let phone = prompt("Enter Customer WhatsApp Number");

if(!phone) return;

phone = phone.replace(/\D/g,"");   // remove spaces or symbols

let totalText=document.getElementById("total").innerText;

let billText="";

bill.forEach(item=>{
let line=item.rate*item.qty;
billText+=item.cat+" "+item.rate+" x "+item.qty+" = "+line+"\n";
});

let message =
"HIRA Gifts & General\n"+
"Main Road, Ambad\n"+
"Mob: 7020773407\n\n"+
"Bill No: "+billNo+"\n"+
"Date: "+new Date().toLocaleDateString()+"\n\n"+
billText+
"\n"+totalText;

let url="https://wa.me/91"+phone+"?text="+encodeURIComponent(message);

window.open(url,"_blank");

}


function renderCategories(){

let grid=document.getElementById("categories");
grid.innerHTML="";

categories.forEach(cat=>{

let div=document.createElement("div");
div.className="category";

div.innerHTML="<span>"+cat.icon+"</span>"+cat.name;

div.onclick=function(){
openPopup(cat.name);
};

grid.appendChild(div);

});

}

function openPopup(cat){

document.getElementById("popupCategory").innerText=cat;

document.getElementById("rateInput").value="";
document.getElementById("qtyInput").value=1;

document.getElementById("itemPopup").style.display="flex";

document.getElementById("rateInput").focus();

}

function confirmItem(){

let cat=document.getElementById("popupCategory").innerText;

let rate=Number(document.getElementById("rateInput").value);
let qty=Number(document.getElementById("qtyInput").value)||1;

if(rate>0){

bill.push({cat,rate,qty});

renderBill();

}

document.getElementById("rateInput").value="";
document.getElementById("qtyInput").value=1;

}

function outsideTap(e){

if(e.target.id!=="itemPopup") return;

let rate=Number(document.getElementById("rateInput").value);
let qty=Number(document.getElementById("qtyInput").value)||1;

if(rate>0){

let cat=document.getElementById("popupCategory").innerText;

bill.push({cat,rate,qty});

renderBill();

}

document.getElementById("itemPopup").style.display="none";

}

function renderBill(){

let itemsDiv=document.getElementById("items");
itemsDiv.innerHTML="";

let total=0;

bill.forEach((item,index)=>{

let line=item.rate*item.qty;
total+=line;

let div=document.createElement("div");

div.innerText=item.cat+"  "+item.rate+" × "+item.qty+" = "+line;

div.onclick=function(){
editItem(index);
};

itemsDiv.appendChild(div);

});

let discount=Number(document.getElementById("discount").value);
total-=discount;

if(document.getElementById("round").checked){
total=Math.round(total);
}

document.getElementById("total").innerText="Total: ₹"+total;

}

document.getElementById("discount").oninput=renderBill;
document.getElementById("round").onchange=renderBill;

function editItem(index){

let item=bill[index];

let newRate=prompt("Edit Rate",item.rate);
if(newRate===null)return;

let newQty=prompt("Edit Quantity",item.qty);
if(newQty===null)return;

bill[index].rate=Number(newRate);
bill[index].qty=Number(newQty);

renderBill();

}

function saveBill(){

let bills=JSON.parse(localStorage.getItem("bills")||"[]");

bills.push({
billNo:billNo.toString().padStart(4,'0'),
date:new Date().toLocaleString(),
items:bill
});

localStorage.setItem("bills",JSON.stringify(bills));

billNo++;
localStorage.setItem("billNo",billNo);

alert("Bill Saved");

}

function viewBills(){

let bills=JSON.parse(localStorage.getItem("bills")||"[]");

if(bills.length===0){
alert("No Bills Saved");
return;
}

let text="";

bills.forEach(b=>{

text+="Bill "+b.billNo+" "+b.date+"\n";

b.items.forEach(i=>{
let amt=i.rate*i.qty;
text+=i.cat+" "+i.rate+" x "+i.qty+" = "+amt+"\n";
});

text+="\n";

});

alert(text);

}

function printBill(){

let totalText=document.getElementById("total").innerText;

let billText="";

bill.forEach(item=>{
let line=item.rate*item.qty;
billText+=item.cat+" "+item.rate+" x "+item.qty+" = "+line+"<br>";
});

let win=window.open("","","width=300");

win.document.write(`
<h3>HIRA Gifts & General</h3>
Main Road, Ambad<br>
Mob: 7020773407<br><br>

Bill No: ${billNo}<br>
Date: ${new Date().toLocaleDateString()}<br><br>

${billText}

<hr>
${totalText}
`);

win.print();

}

function exportExcel(){

let bills=JSON.parse(localStorage.getItem("bills")||"[]");

let csv="BillNo,Date,Category,Rate,Qty,Amount\n";

bills.forEach(b=>{
b.items.forEach(i=>{
let amt=i.rate*i.qty;
csv+=b.billNo+","+b.date+","+i.cat+","+i.rate+","+i.qty+","+amt+"\n";
});
});

let blob=new Blob([csv],{type:"text/csv"});

let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="juggad_sales.csv";
a.click();

}

function clearBill(){

bill=[];
document.getElementById("discount").value=0;
document.getElementById("round").checked=false;

renderBill();

}

renderCategories();

if('serviceWorker' in navigator){
navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>

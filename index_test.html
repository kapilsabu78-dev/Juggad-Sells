<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Juggad Sells</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#444;
color:white;
padding:12px;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:10px;
}

.category{
background:white;
border-radius:8px;
padding:15px;
text-align:center;
cursor:pointer;
border:1px solid #ddd;
font-size:18px;
}

.category span{
display:block;
font-size:26px;
}

.bill{
background:white;
margin:10px;
padding:10px;
border-radius:8px;
}

.dashboard{
background:white;
margin:10px;
padding:10px;
border-radius:8px;
font-size:14px;
}

#items div{
padding:8px;
border-bottom:1px solid #eee;
cursor:pointer;
}

button{
padding:8px 10px;
margin:4px;
}

</style>
</head>

<div id="invScreen" style="
display:none;
position:fixed;
top:0;left:0;right:0;bottom:0;
background:#fff;
z-index:999;
overflow:auto;
padding:15px;
"></div>


<div id="inventoryScreen" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#fff;z-index:999;padding:15px;overflow:auto;"></div>

<div id="stockScreen" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#fff;z-index:999;padding:15px;overflow:auto;"></div>

<div id="historyScreen" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#fff;z-index:999;padding:15px;overflow:auto;"></div>




<script>

if(!localStorage.getItem("tagMap")){
localStorage.setItem("tagMap", JSON.stringify({
"Bag":["@purse","@handpurse","@etc"],
"Toys":["@push","@puzzle","@etc"],
"Gifts":["@decor","@etc"],
"Misc":["@etc"]
}));
}

const InventoryApp = {

category:"",
tag:"",

open(){
document.getElementById("invScreen").style.display="block";
this.showCategories();
},

close(){
document.getElementById("invScreen").style.display="none";
},

showCategories(){

let html="<h3>Select Category</h3>";

categories.forEach(c=>{
html+=`<button onclick="InventoryApp.selectCategory('${c.name}')">${c.name}</button>`;
});

html+=`<br><br><button onclick="InventoryApp.close()">Close</button>`;

document.getElementById("invScreen").innerHTML=html;
},

selectCategory(cat){

this.category=cat;

let tagMap = JSON.parse(localStorage.getItem("tagMap"));
let tags = tagMap[cat] || ["@etc"];

let html=`<h3>${cat} → Select Tag</h3>`;

tags.forEach(t=>{
html+=`<button onclick="InventoryApp.selectTag('${t}')">${t}</button>`;
});

html+=`<br><button onclick="InventoryApp.addTag()">+ Add Tag</button>`;
html+=`<br><br><button onclick="InventoryApp.showCategories()">Back</button>`;

document.getElementById("invScreen").innerHTML=html;
},

addTag(){

let newTag = prompt("Enter new tag (start with @)");

if(!newTag) return;

let tagMap = JSON.parse(localStorage.getItem("tagMap"));

if(!tagMap[this.category]){
tagMap[this.category]=["@etc"];
}

tagMap[this.category].push(newTag);

localStorage.setItem("tagMap", JSON.stringify(tagMap));

alert("Tag added");

this.selectCategory(this.category);
},

selectTag(tag){

this.tag=tag;

document.getElementById("invScreen").innerHTML=`
<h3>${this.category} → ${this.tag}</h3>

Rate ₹<br>
<input type="number" id="invCost"><br><br>

Qty<br>
<input type="number" id="invQty" value="1"><br><br>

<button onclick="InventoryApp.save()">Save</button>
<br><br>
<button onclick="InventoryApp.selectCategory('${this.category}')">Back</button>
`;
},

save(){

let rate = Number(document.getElementById("invCost").value);
let qty = Number(document.getElementById("invQty").value) || 1;

if(!rate){
alert("Enter rate");
return;
}

let totalCost = rate * qty;

let data = JSON.parse(localStorage.getItem("inventory") || "[]");

data.push({
category:this.category,
tag:this.tag,
qty:qty,
cost:totalCost
});

localStorage.setItem("inventory", JSON.stringify(data));

alert("Saved ₹" + totalCost);

this.showCategories();
}

};


</script>




<body>

<header>
<h2>HIRA Gifts & General</h2>
<small>Main Road, Ambad | Mob: 7020773407</small>
</header>

<div class="dashboard" id="dashboard">
Today's Sales ₹0 | Bills 0
</div>

<div class="grid" id="categories"></div>

<div class="bill">

<div id="items"></div>

<hr>

Discount  
<input type="number" id="discount" value="0">

<br>

<label>
<input type="checkbox" id="round"> Round Off
</label>

<h3 id="total">Total: ₹0</h3>

<button onclick="manualSave()">Save</button>
<button onclick="printBill()">Print</button>
<button onclick="openPhonePopup()">WhatsApp</button>
<button onclick="exportExcel()">Excel</button>
<button onclick="viewTodayBills()">Bills</button>
<button onclick="clearBill()">Clear</button>
<button onclick="Inventory.open()">Inventory</button>
<button onclick="Stock.view()">Stock</button>
<button onclick="History.view()">History</button>


</div>

<!-- ITEM POPUP -->

<div id="itemPopup" onclick="outsideTap(event)" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);align-items:center;justify-content:center;">

<div onclick="event.stopPropagation()" style="background:white;padding:20px;border-radius:10px;width:250px;">

<h3 id="popupCategory"></h3>

Rate  
<input type="tel" id="rateInput">

<br><br>

Qty  
<input type="tel" id="qtyInput" value="1">

</div>
</div>

<!-- WHATSAPP PHONE POPUP -->

<div id="phonePopup" onclick="closePhonePopup(event)" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);align-items:center;justify-content:center;">

<div onclick="event.stopPropagation()" style="background:white;padding:20px;border-radius:10px;width:250px;">

<h3>Customer WhatsApp</h3>

<input type="tel" id="phoneInput" placeholder="Enter number">

<br><br>

<button onclick="sendWhatsApp()">Send Bill</button>

</div>
</div>

<script>

let categories=[
{name:"Bag",icon:"👜"},
{name:"Gifts",icon:"🎁"},
{name:"Toys",icon:"🧸"},
{name:"Events",icon:"🎉"},
{name:"Cosmetics",icon:"💄"},
{name:"Jewellery",icon:"💍"},
{name:"Stationary",icon:"✏️"},
{name:"Home Care",icon:"🧴"},
{name:"Misc",icon:"🧾"}
];

let bill=[];
let billSaved=false;
let billNo=localStorage.getItem("billNo")||1;

function renderCategories(){

let grid=document.getElementById("categories");
grid.innerHTML="";

categories.forEach(cat=>{

let div=document.createElement("div");
div.className="category";

div.innerHTML="<span>"+cat.icon+"</span>"+cat.name;

div.onclick=function(){
openPopup(cat.name);
};

grid.appendChild(div);

});
}

function openPopup(cat){

document.getElementById("popupCategory").innerText=cat;

document.getElementById("rateInput").value="";
document.getElementById("qtyInput").value=1;

document.getElementById("itemPopup").style.display="flex";

document.getElementById("rateInput").focus();

}

function outsideTap(e){

if(e.target.id!=="itemPopup") return;

let rate=Number(document.getElementById("rateInput").value);
let qty=Number(document.getElementById("qtyInput").value)||1;

if(rate>0){

let cat=document.getElementById("popupCategory").innerText;

bill.push({cat,rate,qty});

renderBill();
}

document.getElementById("itemPopup").style.display="none";

}

function renderBill(){

let itemsDiv=document.getElementById("items");
itemsDiv.innerHTML="";

let total=0;

bill.forEach((item,index)=>{

let line=item.rate*item.qty;
total+=line;

let div=document.createElement("div");

div.innerText=item.cat+" "+item.rate+" × "+item.qty+" = "+line;

div.onclick=function(){
editOptions(index);
};

itemsDiv.appendChild(div);

});

let discount=Number(document.getElementById("discount").value)||0;

let finalTotal=total-discount;

if(document.getElementById("round").checked){
finalTotal=Math.round(finalTotal);
}



let display="";

if(discount>0){
display=
"Subtotal ₹"+total+
"<br>Discount ₹"+discount+
"<br><b>Total ₹"+finalTotal+"</b>";
}else{
display="<b>Total ₹"+total+"</b>";
}

document.getElementById("total").innerHTML=display;



}

function editOptions(index){

let action=prompt("Type:\n1 Edit\n2 Delete");

if(action==="1"){

let item=bill[index];

let newRate=prompt("Rate",item.rate);
if(newRate===null)return;

let newQty=prompt("Qty",item.qty);
if(newQty===null)return;

bill[index].rate=Number(newRate);
bill[index].qty=Number(newQty);

}

if(action==="2"){
bill.splice(index,1);
}

renderBill();

}

function saveBill(){

if(billSaved) return;

let bills=JSON.parse(localStorage.getItem("bills")||"[]");

bills.push({
billNo:billNo.toString().padStart(4,'0'),
date:new Date().toISOString(),
items:bill,
discount:Number(document.getElementById("discount").value)
});

localStorage.setItem("bills",JSON.stringify(bills));

billNo++;
localStorage.setItem("billNo",billNo);

billSaved=true;

updateDashboard();

}

function manualSave(){

saveBill();
alert("Bill Saved");

}

function updateDashboard(){

let bills=JSON.parse(localStorage.getItem("bills")||"[]");

let today=new Date().toDateString();

let sales=0;
let count=0;

bills.forEach(b=>{

let d=new Date(b.date).toDateString();

if(d===today){

count++;

b.items.forEach(i=>{
sales+=i.rate*i.qty;
});

sales-=b.discount||0;

}

});

document.getElementById("dashboard").innerText=
"Today's Sales ₹"+sales+" | Bills "+count;

}

function viewTodayBills(){

let bills=JSON.parse(localStorage.getItem("bills")||"[]");

let today=new Date().toDateString();

let text="Today's Bills\n\n";

let total=0;
let count=0;

bills.forEach(b=>{

let d=new Date(b.date).toDateString();

if(d===today){

count++;

let billTotal=0;

b.items.forEach(i=>{
billTotal+=i.rate*i.qty;
});

billTotal-=b.discount||0;

text+="Bill "+b.billNo+" ₹"+billTotal+"\n";

total+=billTotal;

}

});

text+="\nTotal Today ₹"+total;
text+="\nBills Count: "+count;

alert(text);

}

function printBill(){

saveBill();

let subtotal=0;

let itemsHTML="";

bill.forEach(item=>{
let line=item.rate*item.qty;
subtotal+=line;
itemsHTML+=item.cat+" "+item.rate+" x "+item.qty+" = "+line+"<br>";
});

let discount=Number(document.getElementById("discount").value);

let total=subtotal-discount;

let discountLine="";

if(discount>0){
discountLine="Subtotal : ₹"+subtotal+"<br>Discount : ₹"+discount+"<br>";
}

let win=window.open("","","width=300");

win.document.write(`
<h3>HIRA Gifts & General</h3>
Main Road, Ambad<br>
Mob: 7020773407<br><br>

Bill No: ${billNo}<br>
${new Date().toLocaleDateString()} • ${new Date().toLocaleTimeString()}<br><br>

${itemsHTML}

<hr>

${discountLine}
Total : ₹${total}

<hr>

No Returns Accepted<br><br>

Follow us on WhatsApp for gift ideas & new stock<br>
Thank You • Visit Again
`);

win.print();

}

function exportExcel(){

saveBill();

let bills=JSON.parse(localStorage.getItem("bills")||"[]");

let csv="BillNo,Date,Category,Rate,Qty,Amount\n";

bills.forEach(b=>{
b.items.forEach(i=>{
let amt=i.rate*i.qty;
csv+=b.billNo+","+b.date+","+i.cat+","+i.rate+","+i.qty+","+amt+"\n";
});
});

let blob=new Blob([csv],{type:"text/csv"});

let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="juggad_sales.csv";
a.click();

}

function openPhonePopup(){

document.getElementById("phonePopup").style.display="flex";

setTimeout(()=>{
document.getElementById("phoneInput").focus();
},100);

}

function closePhonePopup(e){

if(e.target.id==="phonePopup"){
document.getElementById("phonePopup").style.display="none";
}

}

function sendWhatsApp(){

saveBill();

let phone=document.getElementById("phoneInput").value;

if(!phone) return;

phone=phone.replace(/\D/g,"");


let billText="";

bill.forEach(item=>{
let line=item.rate*item.qty;
billText+=item.cat+" "+item.rate+" x "+item.qty+" = "+line+"\n";
});

let subtotal=0;

bill.forEach(item=>{
subtotal+=item.rate*item.qty;
});

let discount=Number(document.getElementById("discount").value)||0;

let finalTotal=subtotal-discount;

let totalSection="";

if(discount>0){
totalSection=
"\nSubtotal ₹"+subtotal+
"\nDiscount ₹"+discount+
"\nTotal ₹"+finalTotal;
}else{
totalSection="\nTotal ₹"+subtotal;
}

let message=
"HIRA Gifts & General\n"+
"Main Road, Ambad\n"+
"Mob: 7020773407\n\n"+
"Bill No: "+billNo+"\n"+
new Date().toLocaleDateString()+" • "+new Date().toLocaleTimeString()+"\n\n"+
billText+
totalSection;

let url="https://wa.me/91"+phone+"?text="+encodeURIComponent(message);

window.open(url,"_blank");

document.getElementById("phonePopup").style.display="none";

}

function clearBill(){

bill=[];
billSaved=false;

document.getElementById("discount").value=0;
document.getElementById("round").checked=false;

renderBill();

}

let tagMap = {
  "Bag": ["@purse","@handpurse","@sag","@treking","@luggage","@trolley","@etc"],
  "Toys": ["@push","@puzzle","@gadgets","@rideons","@soft&dolls","@sports","@activity","@etc"],
  "Gifts": ["@decor","@premium","@festival","@etc"],
  "Cosmetics": ["@daily","@premium","@etc"],
  "Jewellery": ["@set","@single","@etc"],
  "Stationary": ["@pen","@notebook","@etc"],
  "Home Care": ["@kitchen","@decor","@etc"],
  "Events": ["@birthday","@wedding","@etc"],
  "Misc": ["@etc"]
};


function openInventory(){
  selectCategory();
}

function selectCategory(){

let cat = prompt("Enter Category:\nBag, Gifts, Toys, Events, Cosmetics, Jewellery, Stationary, Home Care, Misc");

if(!cat) return;

selectTag(cat);
}

function selectTag(cat){

let tags = tagMap[cat] || ["@etc"];

let tag = prompt("Select Tag:\n"+tags.join(", "));

if(!tag){
let confirmEtc = confirm("No tag selected. Assign @etc?");
if(confirmEtc) tag="@etc";
else return selectTag(cat);
}

enterDetails(cat, tag);
}

function enterDetails(cat, tag){

let cost = Number(prompt("Enter Total Cost"));
if(!cost) return;

let qty = Number(prompt("Enter Quantity")) || 1;

saveInventory(cat, tag, cost, qty);
}


function saveInventory(cat, tag, cost, qty){

let data = JSON.parse(localStorage.getItem("inventory") || "[]");

// find existing
let existing = data.find(d => d.category===cat && d.tag===tag);

if(existing){

let merge = confirm(
"Existing:\n"+cat+" "+tag+
"\nQty:"+existing.qty+" Cost:"+existing.cost+
"\n\nMerge?"
);

if(merge){
existing.qty += qty;
existing.cost += cost;
}else{
data.push({
category:cat,
tag:tag,
qty:qty,
cost:cost,
date:new Date()
});
}

}else{
data.push({
category:cat,
tag:tag,
qty:qty,
cost:cost,
date:new Date()
});
}

localStorage.setItem("inventory", JSON.stringify(data));

alert("Saved "+cat+" "+tag+" Qty:"+qty);
}


function viewStock(){

let data = JSON.parse(localStorage.getItem("inventory") || "[]");

if(data.length===0){
alert("No inventory");
return;
}

let map = {};

data.forEach(d=>{
if(!map[d.category]){
map[d.category] = {qty:0, cost:0, tags:{}};
}

map[d.category].qty += d.qty;
map[d.category].cost += d.cost;

if(!map[d.category].tags[d.tag]){
map[d.category].tags[d.tag] = {qty:0, cost:0};
}

map[d.category].tags[d.tag].qty += d.qty;
map[d.category].tags[d.tag].cost += d.cost;

});

let text = "";

for(let cat in map){

text += cat+" → "+map[cat].qty+" → ₹"+map[cat].cost+"\n";

for(let tag in map[cat].tags){
text += "   "+tag+" → "+map[cat].tags[tag].qty+" → ₹"+map[cat].tags[tag].cost+"\n";
}

text += "\n";
}

alert(text);
}


// ===== TAG MAP (editable) =====
if(!localStorage.getItem("tagMap")){
localStorage.setItem("tagMap", JSON.stringify({
"Bag":["@purse","@handpurse","@etc"],
"Toys":["@push","@puzzle","@rideons","@etc"],
"Gifts":["@decor","@etc"],
"Misc":["@etc"]
}));
}

// ===== INVENTORY =====
const Inventory = {

category:"",
tag:"",

open(){
document.getElementById("inventoryScreen").style.display="block";
this.showCategories();
},

close(){
document.getElementById("inventoryScreen").style.display="none";
},

showCategories(){

let html="<h3>Select Category</h3>";

categories.forEach(c=>{
html+=`<button onclick="Inventory.selectCategory('${c.name}')">${c.name}</button>`;
});

html+=`<br><br><button onclick="Inventory.close()">Close</button>`;

document.getElementById("inventoryScreen").innerHTML=html;
},

selectCategory(cat){

this.category=cat;

let tagMap = JSON.parse(localStorage.getItem("tagMap"));
let tags = tagMap[cat] || ["@etc"];

let html=`<h3>${cat} → Select Tag</h3>`;

tags.forEach(t=>{
html+=`<button onclick="Inventory.selectTag('${t}')">${t}</button>`;
});

// add new tag
html+=`<br><button onclick="Inventory.addTag()">+ Add Tag</button>`;

html+=`<br><br><button onclick="Inventory.showCategories()">Back</button>`;

document.getElementById("inventoryScreen").innerHTML=html;
},

addTag(){

let newTag = prompt("Enter tag (start with @)");
if(!newTag) return;

let tagMap = JSON.parse(localStorage.getItem("tagMap"));

if(!tagMap[this.category]){
tagMap[this.category]=["@etc"];
}

tagMap[this.category].push(newTag);

localStorage.setItem("tagMap", JSON.stringify(tagMap));

this.selectCategory(this.category);
},

selectTag(tag){

this.tag=tag;

let html=`
<h3>${this.category} → ${this.tag}</h3>

Rate ₹<br>
<input type="number" id="invRate"><br><br>

Qty<br>
<input type="number" id="invQty" value="1"><br><br>

<button onclick="Inventory.save()">Save</button>
<br><br>

<button onclick="Inventory.selectCategory('${this.category}')">Back</button>
`;

document.getElementById("inventoryScreen").innerHTML=html;
},

save(){

alert("SAVE RUNNING");


let rate = Number(document.getElementById("invRate").value);
let qty = Number(document.getElementById("invQty").value)||1;

if(!rate){
alert("Enter rate");
return;
}

let total = rate * qty;

let data = JSON.parse(localStorage.getItem("inventory")||"[]");

// merge
let existing = data.find(d=>d.category===this.category && d.tag===this.tag);

if(existing){
existing.qty += qty;
existing.cost += total;
}else{
data.push({
category:this.category,
tag:this.tag,
qty:qty,
cost:total
});
}

// history always separate
let history = JSON.parse(localStorage.getItem("history")||"[]");

history.push({
category:this.category,
tag:this.tag,
qty:qty,
cost:total,
date:new Date()
});

localStorage.setItem("inventory",JSON.stringify(data));
localStorage.setItem("history",JSON.stringify(history));

alert("Saved ₹"+total);

this.showCategories();
}
};


// ===== STOCK =====
const Stock = {

view(){

let data = JSON.parse(localStorage.getItem("inventory")||"[]");

let grouped={};

data.forEach(d=>{
if(!grouped[d.category]) grouped[d.category]=[];
grouped[d.category].push(d);
});

let html="<h2>Stock</h2>";

for(let cat in grouped){

html+=`<h3>${cat}</h3>`;

grouped[cat].forEach(d=>{

let rate=(d.cost/d.qty).toFixed(2);

html+=`
<div style="padding-left:10px;">
${d.tag} → Qty: ${d.qty} | ₹${d.cost} | ₹${rate}/pc
</div>
`;
});

}

html+=`<br><button onclick="Stock.close()">Close</button>`;

let screen=document.getElementById("stockScreen");
screen.innerHTML=html;
screen.style.display="block";
},

close(){
document.getElementById("stockScreen").style.display="none";
}
};


// ===== HISTORY =====

const History = {

view(){

let data = JSON.parse(localStorage.getItem("history") || "[]");

if(data.length===0){
alert("No history");
return;
}

// reverse for latest first
let list = data.slice().reverse();

let html = "<h2>History</h2>";

// ===== Monthly total =====
let monthTotal = 0;
let currentMonth = new Date().toISOString().slice(0,7);

list.forEach(d=>{
let m = new Date(d.date).toISOString().slice(0,7);
if(m===currentMonth){
monthTotal += d.cost;
}
});

html += `<b>This Month Total: ₹${monthTotal}</b><hr>`;

// ===== Group by Date =====
let lastDate = "";

list.forEach((d,i)=>{

let dateObj = new Date(d.date);
let dateStr = dateObj.toDateString();

if(dateStr !== lastDate){
html += `<h3>${dateStr}</h3>`;
lastDate = dateStr;
}

let rate = (d.cost / d.qty).toFixed(2);

html += `
<div style="border-bottom:1px solid #ddd;padding:8px;">
<b>${d.category} → ${d.tag}</b><br>

Bought ${d.qty} pcs @ ₹${rate} = ₹${d.cost}<br>

<small>${dateObj.toLocaleTimeString()}</small><br>

<button onclick="History.del(${data.length-1-i})">Delete</button>
</div>
`;
});

html += `<br><button onclick="History.close()">Close</button>`;

let screen = document.getElementById("historyScreen");
screen.innerHTML = html;
screen.style.display = "block";
},

del(index){

let data = JSON.parse(localStorage.getItem("history")||[]);

if(!confirm("Delete entry?")) return;

data.splice(index,1);

localStorage.setItem("history",JSON.stringify(data));

this.view();
},

close(){
document.getElementById("historyScreen").style.display="none";
}
};


renderCategories();
updateDashboard();

</script>

</body>
</html>
